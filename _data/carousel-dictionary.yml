- title: "piwo"
  type: "rzeczownik; rodz. nijaki"
  description: >-
      pienisty napój, zwykle o małej zawartości alkoholu, otrzymywany przez
      fermentację ze słodu jęczmiennego, chmielu, drożdży i wody; też: porcja
      tego napoju
  variations:
      - "piwko"
      - "piwsko"
  source_name: "Słownik Języka Polskiego | PWN"
  source_link: "https://sjp.pwn.pl/slowniki/piwo.html"
  locale: "pl"

- title: "żeglarstwo"
  titleClass: text-background italic
  type: "rzeczownik; rodz. nijaki"
  description: >-
      sportowe i turystyczne pływanie na łodziach i statkach żaglowych oraz deskach z żaglem
  variations:
      - "jachting"
  source_name: "Słownik Języka Polskiego | PWN"
  source_link: "https://sjp.pwn.pl/slowniki/%C5%BCeglarstwo.html"
  locale: "pl"

- title: "paliwo"
  type: "rzeczownik; rodz. nijaki"
  description: >-
      substancja wykorzystywana jako źródło energii, służącej do napędzania
      różnych urządzeń
  variations:
      - "paliwko"
      - "paliwsko"
  source_name: "Wielki słownik języka polskiego | PAN"
  source_link: "https://wsjp.pl/haslo/podglad/6597/paliwo"
  locale: "pl"

- title: "beer"
  type: "noun"
  description: >-
      a slightly bitter, alcoholic drink made from grain, or a serving of this
      drink in a glass or other container
  source_name: "Cambridge Dictionary"
  source_link: "https://dictionary.cambridge.org/dictionary/english/beer"
  locale: "en"
  pronunciation: "/bɪər/"

- title: "sailing"
  titleClass: text-background italic
  type: "verb"
  pronunciation: "/ˈseɪ.lɪŋ/"
  description: "the sport or activity of using boats with sails"
  variations:
      - "navigation"
      - "boating"
      - "yachting"
  source_name: "Cambridge Dictionary"
  source_link: "https://dictionary.cambridge.org/dictionary/english/sailing"
  locale: "en"

- title: "fuel"
  type: "noun"
  description: >-
      a substance that is used to provide heat or power, usually by being
      burned
  source_name: "Cambridge Dictionary"
  source_link: "https://dictionary.cambridge.org/dictionary/english/fuel"
  locale: "en"
  pronunciation: "/ˈfjuː.əl/"

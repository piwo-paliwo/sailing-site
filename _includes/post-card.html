{%- assign post = include post-%}
<a class="not-prose" href="{{ post.url }}"
    ><div
        class="not-prose bg-secondary/20 text-background border-background/30 flex flex-col gap-6 rounded-xl border py-6 shadow-sm hover:shadow-md transition-all ease-in-out"
    >
        <div
            class="@container/card-header grid auto-rows-min grid-rows-[auto_auto] items-start gap-2 px-6 has-data-[slot=card-action]:grid-cols-[1fr_auto] [.border-b]:pb-6"
        >
            <h3
                class="leading-none uppercase font-serif font-semibold not-prose"
            >
                {{post.title}}
            </h3>
        </div>
        <div class="px-6">
            <img class="rounded-md" src="{{ post.thumbnail }}" />
        </div>
        <!-- <div class="flex items-center px-6 [.border-t]:pt-6"></div> -->
    </div>
</a>
